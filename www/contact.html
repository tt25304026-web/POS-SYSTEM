<html lang="ja">

<meta charset="UTF-8">

</head>

<body>

<div id="contact" class="big-bg">
<header class="page-header wrapper">
<h1><a href="index.html"><img class="logo" src="images/logo.svg" alt="WCBカフェホーム" ></a></h1>
<nav>
<ul class="main-nav">
<li><a href="news.html">News</a></li>
<li><a href="pos/index.html">Menu</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

</header>
<div class="wrapper">
<h2 class="page-title">CONTACT</h2>
</div><!-- /.wrapper-->
</div><!-- /#contact-->

<div class="news-contents wrapper">
    <article>
        <header class="post-info">
            <h2 class="post-title">お問い合わせ</h2>
        </header>
        
        <div class="contact-grid">
            <div class="contact-card">
                <div class="contact-icon">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="contact-text">
                    <h3>Phone</h3>
                    <p><a href="tel:80864355622">80864355622</a></p>
                </div>
            </div>

            <div class="contact-card">
                <div class="contact-icon">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="contact-text">
                    <h3>Email</h3>
                    <p><a href="mailto:harrysoe2003@gmail.com">harrysoe2003@gmail.com</a></p>
                </div>
            </div>

            <div class="contact-card">
                <div class="contact-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="contact-text">
                    <h3>Address</h3>
                    <p>東京都渋谷区神南 1-2-3<br>WCBビル 1F</p>
                </div>
            </div>
        </div>

        <div class="contact-form-container">
            <h3 class="sub-title">メッセージを送る</h3>
            <form action="#" class="contact-form">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" placeholder="山田 太郎">
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label for="message">内容</label>
                    <textarea id="message" name="message" rows="5" placeholder="お問い合わせ内容をご記入ください"></textarea>
                </div>
                <button type="submit" class="button">送信する</button>
            </form>
        </div>
    </article>

    <aside>
        <div class="aside-content">
            <h3 class="sub-title">このお店について</h3>
            <p>
                体に優しい自然食を提供する、WCB CAFE。無添加の食材を利用したメニューが特徴です。
                おいしいブレンドコーヒーとヘルシーなオーガニックフードで体の内側から癒やされてください。
            </p>
            <div class="sns-links">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>
    </aside>
</div><!--- /.news-contents-->

<footer>
    <div class="wrapper">
<p><small>&copy; 2026 Harrysoe</small></p>
    </div>
</footer>
</body>
</html>
